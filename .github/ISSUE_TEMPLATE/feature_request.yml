name: Feature request
description: Suggest an improvement or new editor capability for MeshySmith.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: please search existing issues and discussions to avoid duplicates.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I searched existing issues and discussions for similar requests.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What workflow is difficult or missing today? Who feels the pain?
      placeholder: |
        When I'm building a gear assembly I have to manually duplicate the gear and re-rotate it…
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen? Be specific about UI and behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you rejected them.

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: false
      options:
        - Editor UI (toolbar, palette, outliner, inspector)
        - Viewport (camera, ViewCube, gizmos)
        - Shapes / geometry
        - Import / export (STL, OBJ, images)
        - Persistence (projects, thumbnails, undo)
        - Theming / accessibility
        - Desktop app (Electron)
        - Deployment (Docker, static export)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mocks, links to similar tools, related issues, expected impact.
